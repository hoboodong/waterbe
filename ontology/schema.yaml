version: "1.7"
description: 워터비 온톨로지 스키마

classes:
  Store:
    label: 매장
    description: 이마트 수수료 매장
    properties:
      name:
        type: string
        required: true
        label: 매장명
      location:
        type: string
        required: true
        label: 위치
      branch:
        type: string
        required: false
        label: 지점명 (이마트 지점)
    relations:
      carries:
        target: Product
        cardinality: one-to-many
        label: 판매 상품

  Product:
    label: 상품
    description: 판매 상품 (밀키트, 단품, 게장류 등)
    properties:
      name:
        type: string
        required: true
        label: 상품명
      unit:
        type: string
        required: true
        label: 판매 단위 (예: 1팩, 100g당)
      price:
        type: number
        required: false
        label: 판매가격 (원)
        nullable: true  # 가격 미정인 경우 null 허용
    relations:
      belongsTo:
        target: Category
        cardinality: many-to-one
        label: 카테고리
      soldAt:
        target: Store
        cardinality: many-to-many
        label: 판매 매장

  Category:
    label: 카테고리
    description: 상품 분류 체계
    properties:
      name:
        type: string
        required: true
        label: 카테고리명
      displayOrder:
        type: number
        required: false
        label: 표시 순서
    relations:
      subClassOf:
        target: Category
        cardinality: many-to-one
        label: 상위 카테고리
        nullable: true  # 최상위 카테고리는 null

  Ingredient:
    label: 재료
    description: 레시피에 사용되는 원재료
    properties:
      name:
        type: string
        required: true
        label: 재료명
      defaultUnit:
        type: string
        required: true
        label: 기본 단위 (g, 개, 큰술 등)
      ingredientType:
        type: string
        required: false
        label: 재료 분류 (1차수산물, 채소, 소스, 양념 등)
        nullable: true
      composition:
        type: string
        required: false
        label: 성분 표기 (예: 주꾸미 100%)
        nullable: true
      origin:
        type: string
        required: false
        label: 원산지 (예: 국산, 중국산)
        nullable: true
      allergen:
        type: string
        required: false
        label: 알레르기 유발물질 (예: 새우, 이산화황 함유)
        nullable: true
      thawLossRate:
        type: number
        required: false
        label: 해동 손실률 (%, 예: 15 → 15% 손실)
        nullable: true
      trimLossRate:
        type: number
        required: false
        label: 손질 손실률 (%, 예: 5 → 5% 손실)
        nullable: true
      # 실수율(%) = (1 - thawLossRate/100) × (1 - trimLossRate/100) × 100

  Recipe:
    label: 레시피
    description: 매장별 상품 조리법 (같은 상품도 매장마다 레시피가 다를 수 있음)
    properties:
      name:
        type: string
        required: true
        label: 레시피명

    relations:
      forProduct:
        target: Product
        cardinality: many-to-one
        label: 대상 상품
      atStore:
        target: Store
        cardinality: many-to-one
        label: 해당 매장
      uses:
        target: Ingredient
        cardinality: many-to-many
        label: 사용 재료 (amount·unit 포함)
        with_properties:
          amount:
            type: number
            label: 사용량
          unit:
            type: string
            label: 단위

  PurchaseSpec:
    label: 발주규격
    description: 발주 품목 정보 (재료뿐 아니라 포장재·소모품 포함)
    properties:
      orderName:
        type: string
        required: true
        label: 발주명 (납품업체/시장 기준 상품명, 예: PDTO새우살26-30p(페루산))
      orderUnit:
        type: string
        required: true
        label: 발주 단위 (예: 9kg, 1박스, 1줄)
      category:
        type: string
        required: true
        label: 품목 분류 (재료 / 포장재 / 소모품)
      countPerKg:
        type: number
        required: false
        label: 미수 (개/kg, 예: 25미 → 25. 개수 기준 규격일 때만 입력)
        nullable: true
      # 1개당 평균 무게(g) = 1000 ÷ countPerKg
    relations:
      forIngredient:
        target: Ingredient
        cardinality: many-to-one
        label: 해당 재료
        nullable: true  # 포장재·소모품은 null
      vendor:
        target: Vendor
        cardinality: many-to-one
        label: 납품업체
        nullable: true  # Vendor 클래스 미구현, 추후 연결

  PriceHistory:
    label: 가격이력
    description: 발주규격별 가격 변동 이력. 가격 변경 시 새 레코드 추가 (덮어쓰기 금지)
    properties:
      unitPrice:
        type: number
        required: true
        label: 발주단위 기준 총금액 (원, 예: 9kg 한 박스에 45000원)
      date:
        type: string
        required: true
        label: 가격 기준일자 (YYYY-MM-DD)
      memo:
        type: string
        required: false
        label: 메모 (가격 변동 사유 등)
        nullable: true
    relations:
      forPurchaseSpec:
        target: PurchaseSpec
        cardinality: many-to-one
        label: 해당 발주규격

constraints:
  - "Product.price는 양의 정수이거나 null이어야 한다"
  - "Product.relations.soldAt은 반드시 하나 이상의 Store를 참조해야 한다"
  - "Category.relations.subClassOf는 순환 참조를 허용하지 않는다"
  - "Recipe는 (forProduct, atStore) 조합이 유일해야 한다 (같은 매장·상품 중복 불가)"
  - "Recipe.uses의 ingredient는 반드시 Ingredient 인스턴스를 참조해야 한다"
  - "Ingredient.thawLossRate는 0 이상 100 미만의 숫자여야 한다"
  - "Ingredient.trimLossRate는 0 이상 100 미만의 숫자여야 한다"
  - "PurchaseSpec.countPerKg는 양의 숫자여야 한다"
  - "PriceHistory.unitPrice는 양의 정수여야 한다"
  - "PriceHistory.date는 YYYY-MM-DD 형식이어야 한다"
  - "PriceHistory는 덮어쓰지 않고 변경 시 새 레코드를 추가한다"
