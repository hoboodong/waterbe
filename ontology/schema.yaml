version: "1.3"
description: 워터비 온톨로지 스키마

classes:
  Store:
    label: 매장
    description: 이마트 수수료 매장
    properties:
      name:
        type: string
        required: true
        label: 매장명
      location:
        type: string
        required: true
        label: 위치
      branch:
        type: string
        required: false
        label: 지점명 (이마트 지점)
    relations:
      carries:
        target: Product
        cardinality: one-to-many
        label: 판매 상품

  Product:
    label: 상품
    description: 판매 상품 (밀키트, 단품, 게장류 등)
    properties:
      name:
        type: string
        required: true
        label: 상품명
      unit:
        type: string
        required: true
        label: 판매 단위 (예: 1팩, 100g당)
      price:
        type: number
        required: false
        label: 판매가격 (원)
        nullable: true  # 가격 미정인 경우 null 허용
    relations:
      belongsTo:
        target: Category
        cardinality: many-to-one
        label: 카테고리
      soldAt:
        target: Store
        cardinality: many-to-many
        label: 판매 매장

  Category:
    label: 카테고리
    description: 상품 분류 체계
    properties:
      name:
        type: string
        required: true
        label: 카테고리명
      displayOrder:
        type: number
        required: false
        label: 표시 순서
    relations:
      subClassOf:
        target: Category
        cardinality: many-to-one
        label: 상위 카테고리
        nullable: true  # 최상위 카테고리는 null

  Ingredient:
    label: 재료
    description: 레시피에 사용되는 원재료
    properties:
      name:
        type: string
        required: true
        label: 재료명
      defaultUnit:
        type: string
        required: true
        label: 기본 단위 (g, 개, 큰술 등)
      ingredientType:
        type: string
        required: false
        label: 재료 분류 (1차수산물, 채소, 소스, 양념 등)
        nullable: true
      composition:
        type: string
        required: false
        label: 성분 표기 (예: 주꾸미 100%)
        nullable: true
      origin:
        type: string
        required: false
        label: 원산지 (예: 국산, 중국산)
        nullable: true
      allergen:
        type: string
        required: false
        label: 알레르기 유발물질 (예: 새우, 이산화황 함유)
        nullable: true

  Recipe:
    label: 레시피
    description: 매장별 상품 조리법 (같은 상품도 매장마다 레시피가 다를 수 있음)
    properties:
      name:
        type: string
        required: true
        label: 레시피명
      servings:
        type: number
        required: false
        label: 인분
      cookTime:
        type: number
        required: false
        label: 조리시간 (분)
      steps:
        type: list<string>
        required: false
        label: 조리 순서
    relations:
      forProduct:
        target: Product
        cardinality: many-to-one
        label: 대상 상품
      atStore:
        target: Store
        cardinality: many-to-one
        label: 해당 매장
      uses:
        target: Ingredient
        cardinality: many-to-many
        label: 사용 재료 (amount·unit 포함)
        with_properties:
          amount:
            type: number
            label: 사용량
          unit:
            type: string
            label: 단위

constraints:
  - "Product.price는 양의 정수이거나 null이어야 한다"
  - "Product.relations.soldAt은 반드시 하나 이상의 Store를 참조해야 한다"
  - "Category.relations.subClassOf는 순환 참조를 허용하지 않는다"
  - "Recipe는 (forProduct, atStore) 조합이 유일해야 한다 (같은 매장·상품 중복 불가)"
  - "Recipe.uses의 ingredient는 반드시 Ingredient 인스턴스를 참조해야 한다"
