  - id: recipe_wangsimni_mk001
    class: Recipe
    data:
      name: 문어전복해물탕 (왕십리)
      servings: 2
      cookTime: 20
      steps:
        - 팩 내용물을 꺼내 흐르는 물에 한 번 헹군다
        - 냄비에 육수 600ml를 붓고 센 불로 끓인다
        - 끓으면 문어·전복·채소를 넣고 중불로 줄인다
        - 10분간 더 끓인 후 소금으로 간을 맞춘다
    relations:
      forProduct: prod_mk_001
      atStore: store_wangsimni
      uses:
        - ingredient: ing_문어
          amount: 200
          unit: g
        - ingredient: ing_전복
          amount: 3
          unit: 개
        - ingredient: ing_새우
          amount: 100
          unit: g
        - ingredient: ing_대파
          amount: 30
          unit: g
        - ingredient: ing_애호박
          amount: 50
          unit: g
        - ingredient: ing_청양고추
          amount: 1
          unit: 개
        - ingredient: ing_육수
          amount: 600
          unit: ml
        - ingredient: ing_소금
          amount: 1
          unit: 작은술

